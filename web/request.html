<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оставить заявку</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="script.js?v=40" defer></script>
</head>

<body>
<div class="container">

    <a href="serv1.html" class="back_btn body3">← Назад</a>

    <section class="serv request_page">
        <div class="serv_content">
            <p class="h2">Оставить<br>заявку</p>

            <form id="requestForm" class="form-center">
                <input type="text" id="name" name="name" placeholder="ФИО" required class="input-field">

                <input type="email" id="email" name="email" placeholder="Email" required class="input-field">

                <textarea id="message" name="message" placeholder="Сообщение" rows="4" required class="input-field"></textarea>

                <button type="submit" class="pop-up_btn body2 text-white">Отправить</button>
            </form>
        </div>
    </section>

</div>
</body>
</html>
